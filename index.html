<!doctype html>
<html lang="ko" class="h-full">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>온누리반 짝맞추기 놀이</title>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <link href="https://fonts.googleapis.com/css2?family=Jua&display=swap" rel="stylesheet">
  
  <style>
    * { font-family: 'Jua', sans-serif; box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; background: #FFF8E7; }

    /* =========================================
       공통 스타일
    ========================================= */
    .slide-up { animation: slideUp 0.4s ease forwards; }
    @keyframes slideUp {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .home-btn {
      transition: transform 0.2s;
    }
    .home-btn:hover { transform: scale(1.05); }

    /* =========================================
       게임 1 (카드 뒤집기) 전용 스타일
    ========================================= */
    .f-card-container { perspective: 800px; }
    .f-card-inner {
      transition: transform 0.5s ease;
      transform-style: preserve-3d;
      position: relative;
      width: 100%; height: 100%;
    }
    .f-card-inner.flipped { transform: rotateY(180deg); }
    .f-card-front, .f-card-back {
      position: absolute; width: 100%; height: 100%;
      backface-visibility: hidden; border-radius: 16px;
      display: flex; align-items: center; justify-content: center;
    }
    .f-card-back { transform: rotateY(180deg); }
    .f-card-matched { animation: f-matchPop 0.5s ease; }
    @keyframes f-matchPop {
      0% { transform: rotateY(180deg) scale(1); }
      50% { transform: rotateY(180deg) scale(1.15); }
      100% { transform: rotateY(180deg) scale(1); }
    }
    .f-card-wrong .f-card-inner { animation: f-shake 0.4s ease; }
    @keyframes f-shake {
      0%, 100% { transform: rotateY(180deg) translateX(0); }
      25% { transform: rotateY(180deg) translateX(-8px); }
      75% { transform: rotateY(180deg) translateX(8px); }
    }
    .f-confetti {
      animation: f-celebrate 1.5s ease forwards;
      position: fixed; pointer-events: none; font-size: 2rem; z-index: 100;
    }
    @keyframes f-celebrate {
      0% { transform: scale(0) rotate(0deg); opacity: 1; }
      50% { opacity: 1; }
      100% { transform: scale(1.5) rotate(720deg); opacity: 0; }
    }
    .f-theme-btn, .f-level-btn { transition: all 0.2s ease; }
    .f-theme-btn:hover, .f-level-btn:hover { transform: scale(1.05); }
    .f-star { display: inline-block; animation: f-starBounce 0.4s ease; }
    @keyframes f-starBounce {
      0% { transform: scale(0); }
      60% { transform: scale(1.3); }
      100% { transform: scale(1); }
    }

    /* =========================================
       게임 2 (연관 단어 찾기) 전용 스타일
    ========================================= */
    .l-cat-btn {
      padding: 18px 10px; border-radius: 18px; border: 3px solid #ccc;
      background: #fff; cursor: pointer; font-size: 16px; transition: transform 0.1s;
    }
    .l-cat-btn:hover { transform: translateY(-2px); }
    .l-cat-btn.on { color: #fff; }

    .l-cnt-btn {
      padding: 14px 0; border-radius: 14px; border: 3px solid #F59E0B;
      background: #fff; cursor: pointer; font-size: 22px; font-weight: bold;
      color: #F59E0B; transition: transform 0.1s;
    }
    .l-cnt-btn:hover { transform: translateY(-2px); }
    .l-cnt-btn.on { background: #F59E0B; color: #fff; }

    .l-card {
      position: absolute; display: flex; align-items: center; gap: 8px;
      padding: 10px 14px; border-radius: 14px; border: 3px solid #ddd;
      background: #fff; cursor: pointer; white-space: nowrap;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08); user-select: none; z-index: 10;
      transform: translate(-50%, -50%); transition: border-color 0.2s;
    }
    @keyframes l-poof {
      0% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
      40% { transform: translate(-50%, -50%) scale(1.15); opacity: 1; }
      100% { transform: translate(-50%, -50%) scale(0); opacity: 0; }
    }
    .l-poof-anim {
      animation: l-poof 0.4s forwards ease-in-out; pointer-events: none;
      background: #ECFDF5; border-color: #34D399 !important;
    }
    #l-toast {
      position: fixed; left: 50%; top: 50%; transform: translate(-50%, -50%);
      font-size: 52px; z-index: 999; pointer-events: none; display: none;
    }
    #l-celebWrap {
      display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.45);
      align-items: center; justify-content: center; z-index: 200;
    }
  </style>
</head>
<body class="h-full overflow-auto">

  <div id="mainHub" class="h-full w-full flex flex-col items-center justify-center p-4">
    <div class="text-6xl mb-4 slide-up">🎡</div>
    <h1 class="text-4xl md:text-5xl mb-2 slide-up" style="color: #FF6B6B;">온누리반 짝맞추기 놀이동산</h1>
    <p class="text-xl mb-10 slide-up" style="color: #6C5B7B;">어떤 놀이를 해볼까요?</p>
    
    <div class="flex flex-col sm:flex-row gap-6 slide-up">
      <button onclick="openGame('flip')" class="px-8 py-6 rounded-3xl text-2xl text-white shadow-lg hover:scale-105 transition-transform flex flex-col items-center gap-2" style="background: #FF6B6B;">
        <span class="text-4xl">🃏</span>
        카드 뒤집기 게임
      </button>
      <button onclick="openGame('link')" class="px-8 py-6 rounded-3xl text-2xl text-white shadow-lg hover:scale-105 transition-transform flex flex-col items-center gap-2" style="background: #3B82F6;">
        <span class="text-4xl">🧩</span>
        연관 단어 찾기
      </button>
    </div>
  </div>

  <div id="flipGameContainer" class="hidden h-full w-full flex-col">
    <header class="text-center py-3 px-4 flex-shrink-0 relative">
      <button onclick="openMainHub()" class="home-btn absolute left-4 top-4 px-4 py-2 rounded-xl text-white shadow" style="background: #6C5B7B;">🏠 처음으로</button>
      <h1 id="f-gameTitle" class="text-3xl md:text-4xl" style="color: #FF6B6B;">🃏 같은 그림 찾기</h1>
      <div id="f-statsBar" class="hidden mt-1 flex items-center justify-center gap-4 text-lg" style="color: #6C5B7B;">
        <span>시도: <strong id="f-attempts">0</strong>번</span> <span id="f-starContainer"></span>
      </div>
    </header>

    <div id="f-menuScreen" class="flex-1 flex flex-col items-center justify-center px-4 pb-6 gap-6">
      <div class="w-full max-w-md">
        <h2 class="text-xl mb-3 text-center" style="color: #6C5B7B;">🎨 카드 종류를 골라봐!</h2>
        <div id="f-themeGrid" class="grid grid-cols-2 sm:grid-cols-3 gap-3"></div>
      </div>
      <div class="w-full max-w-md">
        <h2 class="text-xl mb-3 text-center" style="color: #6C5B7B;">⭐ 몇 개로 할까?</h2>
        <div id="f-levelGrid" class="grid grid-cols-2 gap-3"></div>
      </div>
      <button onclick="f_startGame()" class="px-10 py-4 rounded-full text-2xl text-white shadow-lg hover:scale-105 transition-transform" style="background: #FF6B6B;"> 🎮 시작하기! </button>
    </div>

    <div id="f-gameScreen" class="hidden flex-1 flex flex-col px-3 pb-4">
      <div id="f-cardGrid" class="flex-1 grid gap-2 p-2 place-items-center mx-auto w-full max-w-lg"></div>
      <div class="flex justify-center gap-3 mt-2 flex-shrink-0">
        <button onclick="f_goToMenu()" class="px-5 py-2 rounded-full text-lg text-white shadow" style="background: #6C5B7B;"> 🔙 게임메뉴 </button> 
        <button onclick="f_restartGame()" class="px-5 py-2 rounded-full text-lg text-white shadow" style="background: #F8B500;"> 🔄 다시하기 </button>
      </div>
    </div>

    <div id="f-winScreen" class="hidden flex-1 flex flex-col items-center justify-center px-4 gap-4">
      <div class="text-6xl slide-up">🎉</div>
      <h2 class="text-3xl slide-up" style="color: #FF6B6B;">잘했어요!</h2>
      <p id="f-winMsg" class="text-xl slide-up" style="color: #6C5B7B;"></p>
      <div class="flex gap-3 mt-2 slide-up">
        <button onclick="f_goToMenu()" class="px-6 py-3 rounded-full text-xl text-white shadow" style="background: #6C5B7B;">🔙 게임메뉴</button> 
        <button onclick="f_restartGame()" class="px-6 py-3 rounded-full text-xl text-white shadow" style="background: #F8B500;">🔄 다시하기</button>
      </div>
    </div>
  </div>

  <div id="linkGameContainer" class="hidden h-full w-full flex-col bg-[#FFF8F0]">
    <div id="l-menuScreen" style="padding: 28px 20px; text-align: center; flex: 1;">
      <div class="flex justify-start mb-2">
        <button onclick="openMainHub()" class="home-btn px-4 py-2 rounded-xl text-white shadow" style="background: #6C5B7B;">🏠 처음으로</button>
      </div>
      <div style="font-size:54px;margin-bottom:8px;">🧩</div>
      <h1 style="font-size:30px;color:#E8564A;margin-bottom:6px;">짝꿍을 찾아요!</h1>
      <p style="color:#8B7355;font-size:16px;margin-bottom:24px;">주제를 고른 뒤 카드 개수를 누르면 시작!</p>
      <div style="max-width:620px;margin:0 auto;">
        <p style="color:#E8564A;font-weight:bold;font-size:16px;text-align:left;margin-bottom:10px;">📚 주제 선택</p>
        <div id="l-catGrid" style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:22px;"></div>
        <p style="color:#E8564A;font-weight:bold;font-size:16px;text-align:left;margin-bottom:10px;">🔢 카드 쌍 개수 (누르면 바로 시작!)</p>
        <div id="l-cntGrid" style="display:grid;grid-template-columns:repeat(5,1fr);gap:8px;"></div>
      </div>
    </div>

    <div id="l-gameScreen" style="display:none; flex-direction: column; flex: 1;">
      <div style="display:flex;align-items:center;justify-content:space-between;padding:12px 16px;background:#FFE8D6;flex-shrink:0;">
        <button onclick="l_showMenu()" style="padding:8px 14px;border-radius:12px;background:#fff;color:#E8564A;border:none;font-size:15px;cursor:pointer;">◀ 돌아가기</button>
        <div id="l-gTitle" style="font-size:18px;font-weight:bold;color:#E8564A;"></div>
        <div style="padding:8px 14px;border-radius:12px;background:#fff;color:#F59E0B;font-weight:bold;font-size:15px;">⭐ <span id="l-sNum">0</span>/<span id="l-tNum">0</span></div>
      </div>
      <p id="l-gInst" style="text-align:center;color:#8B7355;font-size:16px;padding:10px 16px 0;flex-shrink:0;"></p>
      <div style="flex:1;overflow:hidden;padding:12px 16px; position:relative;">
        <div id="l-gArea" style="position:relative;width:100%;height:100%;max-width:700px;margin:0 auto;"></div>
      </div>
    </div>

    <div id="l-celebWrap">
      <div style="text-align:center;padding:36px 28px;border-radius:22px;background:#FFF8F0;max-width:320px;width:90%;">
        <div style="font-size:56px;margin-bottom:10px;">🎉</div>
        <div style="font-size:22px;font-weight:bold;color:#E8564A;margin-bottom:6px;">잘했어요!</div>
        <div id="l-cScore" style="font-size:16px;color:#8B7355;margin-bottom:20px;"></div>
        <div style="display:flex;gap:10px;justify-content:center;">
          <button onclick="l_replayGame()" style="padding:10px 18px;border-radius:12px;background:#34D399;color:#fff;border:none;font-size:16px;font-weight:bold;cursor:pointer;">다시하기 🔄</button>
          <button onclick="l_showMenu()" style="padding:10px 18px;border-radius:12px;background:#F59E0B;color:#fff;border:none;font-size:16px;font-weight:bold;cursor:pointer;">메뉴로 🔙</button>
        </div>
      </div>
    </div>
    <div id="l-toast"></div>
  </div>


  <script>
    // --- 화면 전환 (허브 라우팅) ---
    function openMainHub() {
      document.getElementById('mainHub').classList.remove('hidden');
      document.getElementById('flipGameContainer').classList.add('hidden');
      document.getElementById('linkGameContainer').classList.add('hidden');
    }

    function openGame(gameType) {
      document.getElementById('mainHub').classList.add('hidden');
      if (gameType === 'flip') {
        document.getElementById('flipGameContainer').classList.remove('hidden');
        document.getElementById('flipGameContainer').classList.add('flex');
        f_buildMenu();
      } else if (gameType === 'link') {
        document.getElementById('linkGameContainer').classList.remove('hidden');
        document.getElementById('linkGameContainer').classList.add('flex');
        l_buildMenu();
      }
    }


    /* =========================================
       게임 1 (카드 뒤집기) 변수 및 함수
    ========================================= */
    const f_themes = {
      animals: { label: '🐶 동물', emoji: '🐶', items: ['🐶','🐱','🐰','🐻','🦊','🐸'] },
      dinos: { label: '🦕 공룡', emoji: '🦕', items: ['🦕','🦖','🐊','🐉','🦎','🐢'] },
      flowers: { label: '🌸 꽃', emoji: '🌸', items: ['🌸','🌻','🌹','🌺','🌷','🌼'] },
      fruits: { label: '🍎 과일', emoji: '🍎', items: ['🍎','🍌','🍇','🍓','🍊','🍉'] },
      ocean: { label: '🐠 바다', emoji: '🐠', items: ['🐠','🐙','🦀','🐳','🦈','🐚'] },
      vehicles: { label: '🚗 탈것', emoji: '🚗', items: ['🚗','🚌','🚀','✈️','🚂','🚁'] }
    };
    const f_levels = [
      { count: 4, label: '쉬워요 (4개)', cols: 2, color: '#4ECDC4' },
      { count: 6, label: '조금 (6개)', cols: 3, color: '#F8B500' },
      { count: 8, label: '보통 (8개)', cols: 4, color: '#FF6B6B' },
      { count: 10, label: '어려워 (10개)', cols: 4, color: '#6C5B7B' },
      { count: 12, label: '최고! (12개)', cols: 4, color: '#2C3E50' }
    ];

    let f_selectedTheme = 'animals';
    let f_selectedLevel = 0;
    let f_cards = [];
    let f_flippedCards = [];
    let f_matchedPairs = 0;
    let f_totalPairs = 0;
    let f_attempts = 0;
    let f_locked = false;

    function f_buildMenu() {
      const tg = document.getElementById('f-themeGrid');
      tg.innerHTML = '';
      Object.entries(f_themes).forEach(([key, t]) => {
        const btn = document.createElement('button');
        btn.className = `f-theme-btn rounded-2xl p-3 text-center text-lg shadow-md border-4 ${key === f_selectedTheme ? 'border-yellow-400 scale-105' : 'border-transparent'}`;
        btn.style.background = '#fff';
        btn.style.color = '#6C5B7B';
        btn.innerHTML = `<div class="text-3xl">${t.emoji}</div><div class="mt-1">${t.label.split(' ')[1]}</div>`;
        btn.onclick = () => { f_selectedTheme = key; f_buildMenu(); };
        tg.appendChild(btn);
      });

      const lg = document.getElementById('f-levelGrid');
      lg.innerHTML = '';
      f_levels.forEach((l, i) => {
        const btn = document.createElement('button');
        btn.className = `f-level-btn rounded-2xl p-3 text-lg shadow-md border-4 text-white font-bold ${i === f_selectedLevel ? 'border-yellow-400 scale-105' : 'border-transparent'}`;
        btn.style.background = l.color;
        btn.textContent = l.label;
        btn.onclick = () => { f_selectedLevel = i; f_buildMenu(); };
        lg.appendChild(btn);
      });
    }

    function f_shuffle(arr) {
      for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
      }
      return arr;
    }

    function f_startGame() {
      const level = f_levels[f_selectedLevel];
      const theme = f_themes[f_selectedTheme];
      f_totalPairs = level.count / 2;
      const chosen = f_shuffle([...theme.items]).slice(0, f_totalPairs);
      f_cards = f_shuffle([...chosen, ...chosen]);
      f_matchedPairs = 0;
      f_attempts = 0;
      f_flippedCards = [];
      f_locked = false;

      document.getElementById('f-attempts').textContent = '0';
      document.getElementById('f-starContainer').innerHTML = '';
      document.getElementById('f-statsBar').classList.remove('hidden');
      document.getElementById('f-menuScreen').classList.add('hidden');
      document.getElementById('f-winScreen').classList.add('hidden');
      document.getElementById('f-gameScreen').classList.remove('hidden');

      const grid = document.getElementById('f-cardGrid');
      const cols = level.cols;
      const rows = Math.ceil(f_cards.length / cols);
      grid.style.gridTemplateColumns = `repeat(${cols}, 1fr)`;
      grid.style.gridTemplateRows = `repeat(${rows}, 1fr)`;
      grid.innerHTML = '';

      f_cards.forEach((emoji, idx) => {
        const card = document.createElement('div');
        card.className = 'f-card-container w-full h-full cursor-pointer';
        card.style.maxWidth = '120px';
        card.style.maxHeight = '120px';
        card.style.aspectRatio = '1';
        card.dataset.idx = idx;
        card.innerHTML = `
          <div class="f-card-inner" id="f-ci${idx}">
            <div class="f-card-front shadow-lg border-2" style="background: linear-gradient(135deg, #FF6B6B, #F8B500); border-color: #fff;">
              <span class="text-3xl">❓</span>
            </div>
            <div class="f-card-back shadow-lg border-2" style="background: #fff; border-color: #4ECDC4;">
              <span class="text-4xl">${emoji}</span>
            </div>
          </div>`;
        card.onclick = () => f_flipCard(idx);
        grid.appendChild(card);
      });
    }

    function f_flipCard(idx) {
      if (f_locked) return;
      const inner = document.getElementById('f-ci' + idx);
      if (inner.classList.contains('flipped')) return;
      if (f_flippedCards.length >= 2) return;

      inner.classList.add('flipped');
      f_flippedCards.push(idx);

      if (f_flippedCards.length === 2) {
        f_locked = true;
        f_attempts++;
        document.getElementById('f-attempts').textContent = f_attempts;

        const [a, b] = f_flippedCards;
        if (f_cards[a] === f_cards[b]) {
          f_matchedPairs++;
          const sc = document.getElementById('f-starContainer');
          const s = document.createElement('span');
          s.className = 'f-star';
          s.textContent = '⭐';
          sc.appendChild(s);
          document.getElementById('f-ci' + a).classList.add('f-card-matched');
          document.getElementById('f-ci' + b).classList.add('f-card-matched');
          f_flippedCards = [];
          f_locked = false;

          if (f_matchedPairs === f_totalPairs) {
            setTimeout(f_showWin, 600);
          }
        } else {
          const ca = document.getElementById('f-ci' + a).parentElement;
          const cb = document.getElementById('f-ci' + b).parentElement;
          ca.classList.add('f-card-wrong');
          cb.classList.add('f-card-wrong');
          setTimeout(() => {
            document.getElementById('f-ci' + a).classList.remove('flipped');
            document.getElementById('f-ci' + b).classList.remove('flipped');
            ca.classList.remove('f-card-wrong');
            cb.classList.remove('f-card-wrong');
            f_flippedCards = [];
            f_locked = false;
          }, 800);
        }
      }
    }

    function f_showWin() {
      document.getElementById('f-gameScreen').classList.add('hidden');
      document.getElementById('f-winScreen').classList.remove('hidden');
      document.getElementById('f-winMsg').textContent = `${f_attempts}번 만에 다 찾았어요! 👏`;
      for (let i = 0; i < 12; i++) {
        const c = document.createElement('div');
        c.className = 'f-confetti';
        c.textContent = ['⭐','🎉','🌟','💖','🎈','🌈'][i % 6];
        c.style.left = Math.random() * 90 + 5 + '%';
        c.style.top = Math.random() * 60 + 10 + '%';
        c.style.animationDelay = (Math.random() * 0.5) + 's';
        document.body.appendChild(c);
        setTimeout(() => c.remove(), 2000);
      }
    }

    function f_goToMenu() {
      document.getElementById('f-gameScreen').classList.add('hidden');
      document.getElementById('f-winScreen').classList.add('hidden');
      document.getElementById('f-statsBar').classList.add('hidden');
      document.getElementById('f-menuScreen').classList.remove('hidden');
    }

    function f_restartGame() {
      document.getElementById('f-winScreen').classList.add('hidden');
      f_startGame();
    }


    /* =========================================
       게임 2 (연관 단어 찾기) 변수 및 함수
    ========================================= */
    const l_CATS = [
      {
        id:'color', icon:'🎨', title:'색깔과 사물', color:'#FF9800',
        inst:'색깔과 어울리는 사물을 연결하세요!',
        pairs:[
          {L:'🔴',Ll:'빨간색',R:'🍎',Rl:'사과'}, {L:'🟡',Ll:'노란색',R:'🍌',Rl:'바나나'},
          {L:'🟢',Ll:'초록색',R:'🥒',Rl:'오이'}, {L:'🟠',Ll:'주황색',R:'🥕',Rl:'당근'},
          {L:'🟣',Ll:'보라색',R:'🍇',Rl:'포도'}, {L:'🟤',Ll:'갈색',R:'🌰',Rl:'밤'},
          {L:'🔵',Ll:'파란색',R:'🫐',Rl:'블루베리'}, {L:'⚫',Ll:'검은색',R:'🖤',Rl:'검은 하트'},
          {L:'⚪',Ll:'흰색',R:'❄️',Rl:'눈'}
        ]
      },
      {
        id:'number', icon:'🔢', title:'숫자 맞추기 1~10', color:'#3B82F6',
        inst:'같은 숫자를 찾아 연결하세요!',
        pairs:[
          {L:'1️⃣',Ll:'하나',R:'①',Rl:'1'}, {L:'2️⃣',Ll:'둘',R:'②',Rl:'2'},
          {L:'3️⃣',Ll:'셋',R:'③',Rl:'3'}, {L:'4️⃣',Ll:'넷',R:'④',Rl:'4'},
          {L:'5️⃣',Ll:'다섯',R:'⑤',Rl:'5'}, {L:'6️⃣',Ll:'여섯',R:'⑥',Rl:'6'},
          {L:'7️⃣',Ll:'일곱',R:'⑦',Rl:'7'}, {L:'8️⃣',Ll:'여덟',R:'⑧',Rl:'8'},
          {L:'9️⃣',Ll:'아홉',R:'⑨',Rl:'9'}, {L:'🔟',Ll:'열',R:'⑩',Rl:'10'}
        ]
      },
      {
        id:'body', icon:'👋', title:'신체 부위 찾기', color:'#EF4444',
        inst:'같은 신체 부위를 찾아 연결하세요!',
        pairs:[
          {L:'✋',Ll:'손',R:'🤚',Rl:'손'}, {L:'👁️',Ll:'눈',R:'👀',Rl:'눈'},
          {L:'👃',Ll:'코',R:'👃',Rl:'코'}, {L:'👂',Ll:'귀',R:'👂',Rl:'귀'},
          {L:'👅',Ll:'혀',R:'👅',Rl:'혀'}, {L:'🦷',Ll:'이',R:'🦷',Rl:'이'},
          {L:'🦴',Ll:'뼈',R:'🦴',Rl:'뼈'}, {L:'💪',Ll:'팔',R:'💪',Rl:'팔'},
          {L:'🦶',Ll:'발',R:'🦵',Rl:'다리'}, {L:'🖐️',Ll:'손가락',R:'☝️',Rl:'손가락'},
          {L:'🫦',Ll:'입술',R:'😮',Rl:'입'}
        ]
      }
    ];

    let l_curCat = null;
    let l_pairs = [];
    let l_matched = [];
    let l_selL = -1;
    let l_selR = -1;
    let l_score = 0;
    let l_busy = false;

    function l_buildMenu() {
      const cg = document.getElementById('l-catGrid');
      if(cg.innerHTML !== '') return; // 이미 생성되었으면 통과
      
      l_CATS.forEach(function(cat) {
        let b = document.createElement('button');
        b.className = 'l-cat-btn';
        b.style.borderColor = cat.color;
        b.innerHTML = '<span style="font-size:34px;display:block;margin-bottom:6px">' + cat.icon + '</span>' + cat.title;
        b.onclick = function() {
          l_curCat = cat;
          let all = document.querySelectorAll('.l-cat-btn');
          for (let i=0; i<all.length; i++) {
            all[i].classList.remove('on');
            all[i].style.background = '#fff';
            all[i].style.color = '#333';
          }
          b.classList.add('on');
          b.style.background = cat.color;
          b.style.color = '#fff';
        };
        cg.appendChild(b);
      });

      const ng = document.getElementById('l-cntGrid');
      [2,4,6,8,10].forEach(function(n) {
        let b = document.createElement('button');
        b.className = 'l-cnt-btn';
        b.textContent = n;
        b.onclick = function() {
          if (!l_curCat) { alert('먼저 주제를 선택해 주세요! 👆'); return; }
          l_startGame(n);
        };
        ng.appendChild(b);
      });
    }

    function l_startGame(count) {
      l_score = 0; l_matched = []; l_selL = -1; l_selR = -1; l_busy = false;
      const max = Math.min(count, l_curCat.pairs.length);
      const shuffled = l_curCat.pairs.slice().sort(() => Math.random() - 0.5);
      l_pairs = shuffled.slice(0, max);

      document.getElementById('l-gTitle').textContent = l_curCat.title;
      document.getElementById('l-gInst').textContent = l_curCat.inst;
      document.getElementById('l-sNum').textContent = '0';
      document.getElementById('l-tNum').textContent = max;

      document.getElementById('l-celebWrap').style.display = 'none';
      document.getElementById('l-menuScreen').style.display = 'none';
      document.getElementById('l-gameScreen').style.display = 'flex';

      l_buildCards();
    }

    function l_showMenu() {
      document.getElementById('l-celebWrap').style.display = 'none';
      document.getElementById('l-gameScreen').style.display = 'none';
      document.getElementById('l-menuScreen').style.display = 'block';
      const cnts = document.querySelectorAll('.l-cnt-btn');
      for (let i=0; i<cnts.length; i++) cnts[i].classList.remove('on');
    }

    function l_replayGame() {
      document.getElementById('l-celebWrap').style.display = 'none';
      l_startGame(l_pairs.length);
    }

    function l_buildCards() {
      const gArea = document.getElementById('l-gArea');
      gArea.innerHTML = '';

      let cards = [];
      for (let i=0; i<l_pairs.length; i++) {
        cards.push({side:'L', idx:i});
        cards.push({side:'R', idx:i});
      }
      cards.sort(() => Math.random() - 0.5);

      const totalCards = cards.length;
      let cols = 2, rows = 2;
      if (totalCards > 12) { cols = 4; rows = Math.ceil(totalCards / 4); }
      else if (totalCards > 8) { cols = 3; rows = Math.ceil(totalCards / 3); }
      else if (totalCards > 4) { cols = 3; rows = Math.ceil(totalCards / 3); }

      let spots = [];
      for (let r = 0; r < rows; r++) {
        for (let c = 0; c < cols; c++) spots.push({r: r, c: c});
      }
      spots.sort(() => Math.random() - 0.5);

      for (let ci=0; ci<cards.length; ci++) {
        (function(card, spot) {
          let el = document.createElement('div');
          el.className = 'l-card';
          el.id = 'l-cd-' + card.side + '-' + card.idx;

          let em = document.createElement('span');
          em.style.fontSize = '26px';
          em.textContent = card.side==='L' ? l_pairs[card.idx].L : l_pairs[card.idx].R;

          let lb = document.createElement('span');
          lb.style.cssText = 'font-size:13px;color:#555;';
          lb.textContent = card.side==='L' ? l_pairs[card.idx].Ll : l_pairs[card.idx].Rl;

          el.appendChild(em); el.appendChild(lb);
          el.onclick = function() { l_onCard(card.side, card.idx, el); };

          let cellW = 100 / cols, cellH = 100 / rows;
          let baseX = (spot.c * cellW) + (cellW / 2);
          let baseY = (spot.r * cellH) + (cellH / 2);

          let jitterX = (Math.random() - 0.5) * (cellW * 0.4);
          let jitterY = (Math.random() - 0.5) * (cellH * 0.4);
          
          let finalX = Math.max(12, Math.min(88, baseX + jitterX));
          let finalY = Math.max(10, Math.min(90, baseY + jitterY));

          el.style.left = finalX + '%';
          el.style.top  = finalY + '%';

          gArea.appendChild(el);
        })(cards[ci], spots[ci]);
      }
    }

    function l_onCard(side, idx, el) {
      if (l_busy) return;
      for (let m=0; m<l_matched.length; m++) { if (l_matched[m]===idx) return; }

      if (side === 'L') {
        if (l_selL !== -1) {
          let prev = document.getElementById('l-cd-L-' + l_selL);
          if (prev) prev.style.borderColor = '#ddd';
        }
        l_selL = idx;
        el.style.borderColor = l_curCat.color;
      } else {
        if (l_selR !== -1) {
          let prev = document.getElementById('l-cd-R-' + l_selR);
          if (prev) prev.style.borderColor = '#ddd';
        }
        l_selR = idx;
        el.style.borderColor = l_curCat.color;
      }

      if (l_selL !== -1 && l_selR !== -1) l_checkMatch();
    }

    function l_checkMatch() {
      l_busy = true;
      let lEl = document.getElementById('l-cd-L-' + l_selL);
      let rEl = document.getElementById('l-cd-R-' + l_selR);
      let ok = (l_selL === l_selR);
      let snapL = l_selL;
      
      l_selL = -1; l_selR = -1;

      if (ok) {
        l_matched.push(snapL);
        l_score++;
        document.getElementById('l-sNum').textContent = l_score;
        
        if (lEl) lEl.classList.add('l-poof-anim');
        if (rEl) rEl.classList.add('l-poof-anim');
        
        l_showToast('⭐');
        l_busy = false; 
        
        if (l_score === l_pairs.length) { setTimeout(l_celebrate, 600); }
      } else {
        if (lEl) lEl.style.borderColor = '#EF4444';
        if (rEl) rEl.style.borderColor = '#EF4444';
        l_showToast('❌');
        setTimeout(function() {
          if (lEl) lEl.style.borderColor = '#ddd';
          if (rEl) rEl.style.borderColor = '#ddd';
          l_busy = false;
        }, 400);
      }
    }

    function l_showToast(emoji) {
      let t = document.getElementById('l-toast');
      t.textContent = emoji;
      t.style.display = 'block';
      t.style.opacity = '1';
      t.style.transition = 'none';
      t.style.top = '50%';
      setTimeout(function() {
        t.style.transition = 'top 0.6s ease, opacity 0.6s ease';
        t.style.top = '35%';
        t.style.opacity = '0';
      }, 60);
      setTimeout(function() { t.style.display = 'none'; }, 700);
    }

    function l_celebrate() {
      document.getElementById('l-cScore').textContent = l_pairs.length + '개 모두 맞혔어요! 🌟';
      document.getElementById('l-celebWrap').style.display = 'flex';
    }

  </script>
</body>
</html>
